services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nlq_postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: nlq_postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      MONGO_URI: mongodb://mongo:27017/
      MONGO_DB: nlq_mongo
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - mongo
    volumes:
      - ./backend/app:/app
      - ./backend/scripts:/app/scripts

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8000/api
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  mongo_data:
